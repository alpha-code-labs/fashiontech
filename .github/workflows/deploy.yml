name: Build and Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest

      - name: Deploy to Azure Container Apps
        run: |
          # Create Container Apps Environment if it doesn't exist
          az containerapp env show \
            --name fashiontech-env \
            --resource-group fashiontech-rg 2>/dev/null || \
          az containerapp env create \
            --name fashiontech-env \
            --resource-group fashiontech-rg \
            --location centralindia

          # Delete the old separate Redis container app if it exists
          az containerapp delete \
            --name fashiontech-redis \
            --resource-group fashiontech-rg \
            --yes 2>/dev/null || true

          # Generate YAML template with Redis as sidecar container
          cat > /tmp/containerapp.yaml <<YAMLEOF
          properties:
            configuration:
              ingress:
                external: true
                targetPort: 8000
              registries:
                - server: ${{ secrets.ACR_LOGIN_SERVER }}
                  username: ${{ secrets.ACR_USERNAME }}
                  passwordSecretRef: acr-password
              secrets:
                - name: acr-password
                  value: "${{ secrets.ACR_PASSWORD }}"
                - name: whatsapp-token
                  value: "${{ secrets.WHATSAPP_TOKEN }}"
                - name: gemini-api-key
                  value: "${{ secrets.GEMINI_API_KEY }}"
                - name: gemini-api-keys
                  value: "${{ secrets.GEMINI_API_KEYS }}"
                - name: unlimited-numbers
                  value: "${{ secrets.UNLIMITED_NUMBERS }}"
            template:
              containers:
                - name: fashiontech-app
                  image: ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }}
                  resources:
                    cpu: 1
                    memory: 2Gi
                  env:
                    - name: REDIS_URL
                      value: redis://localhost:6379/0
                    - name: VERIFY_TOKEN
                      value: empressa_verify_2026
                    - name: PHONE_NUMBER_ID
                      value: "${{ secrets.PHONE_NUMBER_ID }}"
                    - name: GRAPH_API_VERSION
                      value: v19.0
                    - name: SESSION_TIMEOUT_SECONDS
                      value: "600"
                    - name: CHECKER_INTERVAL_SECONDS
                      value: "5"
                    - name: GEMINI_TEXT_MODEL
                      value: gemini-2.0-flash
                    - name: GEMINI_IMAGE_MODEL
                      value: gemini-2.5-flash-image
                    - name: WHATSAPP_TOKEN
                      secretRef: whatsapp-token
                    - name: GEMINI_API_KEY
                      secretRef: gemini-api-key
                    - name: GEMINI_API_KEYS
                      secretRef: gemini-api-keys
                    - name: UNLIMITED_NUMBERS
                      secretRef: unlimited-numbers
                - name: redis
                  image: redis:7-alpine
                  resources:
                    cpu: 0.25
                    memory: 0.5Gi
                  command:
                    - redis-server
                    - --save
                    - ""
                    - --appendonly
                    - "no"
              scale:
                minReplicas: 1
                maxReplicas: 3
          YAMLEOF

          # Remove leading spaces from YAML (heredoc indentation)
          sed -i 's/^          //' /tmp/containerapp.yaml

          # Check if app exists — update or create
          if az containerapp show --name fashiontech-app --resource-group fashiontech-rg 2>/dev/null; then
            az containerapp update \
              --name fashiontech-app \
              --resource-group fashiontech-rg \
              --yaml /tmp/containerapp.yaml
          else
            az containerapp create \
              --name fashiontech-app \
              --resource-group fashiontech-rg \
              --environment fashiontech-env \
              --yaml /tmp/containerapp.yaml
          fi

          # Get the app URL and print it
          APP_URL=$(az containerapp show \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App deployed at: https://${APP_URL}"
          echo "Webhook URL: https://${APP_URL}/webhook"
