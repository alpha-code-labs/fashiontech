name: Build and Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest

      - name: Deploy to Azure Container Apps
        env:
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          IMG_TAG: ${{ github.sha }}
          WA_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          PHONE_ID: ${{ secrets.PHONE_NUMBER_ID }}
          GEM_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEM_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          UNLIM_NUMS: ${{ secrets.UNLIMITED_NUMBERS }}
        run: |
          # Create Container Apps Environment if it doesn't exist
          az containerapp env show \
            --name fashiontech-env \
            --resource-group fashiontech-rg 2>/dev/null || \
          az containerapp env create \
            --name fashiontech-env \
            --resource-group fashiontech-rg \
            --location centralindia

          # Delete the old separate Redis container app if it exists
          az containerapp delete \
            --name fashiontech-redis \
            --resource-group fashiontech-rg \
            --yes 2>/dev/null || true

          # Generate YAML with Python for proper escaping of secret values
          python3 << 'PYEOF'
          import yaml, os

          data = {
              "properties": {
                  "configuration": {
                      "ingress": {
                          "external": True,
                          "targetPort": 8000
                      },
                      "registries": [{
                          "server": os.environ["ACR_SERVER"],
                          "username": os.environ["ACR_USER"],
                          "passwordSecretRef": "acr-password"
                      }],
                      "secrets": [
                          {"name": "acr-password", "value": os.environ["ACR_PASS"]},
                          {"name": "whatsapp-token", "value": os.environ["WA_TOKEN"]},
                          {"name": "gemini-api-key", "value": os.environ["GEM_KEY"]},
                          {"name": "gemini-api-keys", "value": os.environ["GEM_KEYS"]},
                          {"name": "unlimited-numbers", "value": os.environ["UNLIM_NUMS"]},
                      ]
                  },
                  "template": {
                      "containers": [
                          {
                              "name": "fashiontech-app",
                              "image": f'{os.environ["ACR_SERVER"]}/fashiontech:{os.environ["IMG_TAG"]}',
                              "resources": {"cpu": 1, "memory": "2Gi"},
                              "env": [
                                  {"name": "REDIS_URL", "value": "redis://localhost:6379/0"},
                                  {"name": "PUBLIC_BASE_URL", "value": os.environ.get("APP_FQDN", "https://placeholder")},
                                  {"name": "VERIFY_TOKEN", "value": "empressa_verify_2026"},
                                  {"name": "PHONE_NUMBER_ID", "value": os.environ["PHONE_ID"]},
                                  {"name": "GRAPH_API_VERSION", "value": "v19.0"},
                                  {"name": "SESSION_TIMEOUT_SECONDS", "value": "600"},
                                  {"name": "CHECKER_INTERVAL_SECONDS", "value": "5"},
                                  {"name": "GEMINI_TEXT_MODEL", "value": "gemini-2.0-flash"},
                                  {"name": "GEMINI_IMAGE_MODEL", "value": "gemini-2.5-flash-image"},
                                  {"name": "WHATSAPP_TOKEN", "secretRef": "whatsapp-token"},
                                  {"name": "GEMINI_API_KEY", "secretRef": "gemini-api-key"},
                                  {"name": "GEMINI_API_KEYS", "secretRef": "gemini-api-keys"},
                                  {"name": "UNLIMITED_NUMBERS", "secretRef": "unlimited-numbers"},
                              ]
                          },
                          {
                              "name": "redis",
                              "image": "redis:7-alpine",
                              "resources": {"cpu": 0.25, "memory": "0.5Gi"},
                              "command": ["redis-server", "--save", "", "--appendonly", "no"]
                          }
                      ],
                      "scale": {
                          "minReplicas": 1,
                          "maxReplicas": 3
                      }
                  }
              }
          }

          with open("/tmp/containerapp.yaml", "w") as f:
              yaml.dump(data, f, default_flow_style=False)
          PYEOF

          echo "--- Generated YAML (secrets redacted) ---"
          grep -v "value:" /tmp/containerapp.yaml || true
          echo "---"

          # Check if app exists — update or create
          if az containerapp show --name fashiontech-app --resource-group fashiontech-rg 2>/dev/null; then
            az containerapp update \
              --name fashiontech-app \
              --resource-group fashiontech-rg \
              --yaml /tmp/containerapp.yaml
          else
            az containerapp create \
              --name fashiontech-app \
              --resource-group fashiontech-rg \
              --environment fashiontech-env \
              --yaml /tmp/containerapp.yaml
          fi

          # Get the app FQDN and set PUBLIC_BASE_URL
          APP_FQDN=$(az containerapp show \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          # Re-generate YAML with correct PUBLIC_BASE_URL and re-apply
          APP_FQDN="https://${APP_FQDN}" python3 << 'PYEOF2'
          import yaml, os
          with open("/tmp/containerapp.yaml") as f:
              data = yaml.safe_load(f)
          for env in data["properties"]["template"]["containers"][0]["env"]:
              if env["name"] == "PUBLIC_BASE_URL":
                  env["value"] = os.environ["APP_FQDN"]
                  break
          with open("/tmp/containerapp.yaml", "w") as f:
              yaml.dump(data, f, default_flow_style=False)
          PYEOF2

          az containerapp update \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --yaml /tmp/containerapp.yaml

          echo "App deployed at: https://${APP_FQDN}"
          echo "Webhook URL: https://${APP_FQDN}/webhook"
