name: Build and Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }} -t ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:latest

      - name: Deploy to Azure Container Apps
        run: |
          # Create Container Apps Environment if it doesn't exist
          az containerapp env show \
            --name fashiontech-env \
            --resource-group fashiontech-rg 2>/dev/null || \
          az containerapp env create \
            --name fashiontech-env \
            --resource-group fashiontech-rg \
            --location centralindia

          # Deploy or update Redis container app
          az containerapp show \
            --name fashiontech-redis \
            --resource-group fashiontech-rg 2>/dev/null || \
          az containerapp create \
            --name fashiontech-redis \
            --resource-group fashiontech-rg \
            --environment fashiontech-env \
            --image redis:7-alpine \
            --target-port 6379 \
            --ingress internal \
            --min-replicas 1 \
            --max-replicas 1 \
            --cpu 0.25 \
            --memory 0.5Gi

          # Get Redis internal FQDN
          REDIS_FQDN=$(az containerapp show \
            --name fashiontech-redis \
            --resource-group fashiontech-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          # Deploy or update the main app
          az containerapp show \
            --name fashiontech-app \
            --resource-group fashiontech-rg 2>/dev/null && \
          az containerapp update \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }} || \
          az containerapp create \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --environment fashiontech-env \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/fashiontech:${{ github.sha }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --target-port 8000 \
            --ingress external \
            --min-replicas 1 \
            --max-replicas 3 \
            --cpu 1 \
            --memory 2Gi \
            --env-vars \
              REDIS_URL=redis://${REDIS_FQDN}:6379/0 \
              VERIFY_TOKEN=empressa_verify_2026 \
              PHONE_NUMBER_ID=${{ secrets.PHONE_NUMBER_ID }} \
              GRAPH_API_VERSION=v19.0 \
              SESSION_TIMEOUT_SECONDS=600 \
              CHECKER_INTERVAL_SECONDS=5 \
              GEMINI_TEXT_MODEL=gemini-2.0-flash \
              GEMINI_IMAGE_MODEL=gemini-2.5-flash-image \
              WHATSAPP_TOKEN=secretref:whatsapp-token \
              GEMINI_API_KEY=secretref:gemini-api-key \
              GEMINI_API_KEYS=secretref:gemini-api-keys \
              UNLIMITED_NUMBERS=secretref:unlimited-numbers \
            --secrets \
              whatsapp-token=${{ secrets.WHATSAPP_TOKEN }} \
              gemini-api-key=${{ secrets.GEMINI_API_KEY }} \
              gemini-api-keys=${{ secrets.GEMINI_API_KEYS }} \
              unlimited-numbers=${{ secrets.UNLIMITED_NUMBERS }}

          # Get the app URL and print it
          APP_URL=$(az containerapp show \
            --name fashiontech-app \
            --resource-group fashiontech-rg \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "App deployed at: https://${APP_URL}"
          echo "Webhook URL: https://${APP_URL}/webhook"
